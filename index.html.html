<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPORT VAULT | CS: Source Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;1,900&family=Inter:wght@400;600;800&display=swap');

        :root {
            --sport-blue: #0066ff;
            --sport-red: #ff003c;
            --sport-dark: #080a0c;
            --sport-surface: #12151a;
            --sport-border: #222831;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--sport-dark);
            color: #ffffff;
            background-image: 
                linear-gradient(rgba(0, 102, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 102, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .sport-font { font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; font-style: italic; }

        .sidebar {
            width: 280px;
            background: rgba(18, 21, 26, 0.95);
            backdrop-filter: blur(10px);
            border-right: 2px solid var(--sport-blue);
            height: calc(100vh - 70px);
            position: sticky;
            top: 70px;
        }

        .nav-item {
            padding: 14px 24px;
            display: flex;
            align-items: center;
            font-size: 14px;
            font-weight: 800;
            color: #8a929b;
            transition: all 0.3s skew(-10deg);
            margin: 4px 12px;
            border-radius: 4px;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--sport-blue);
            color: white;
            transform: skew(-10deg) translateX(5px);
            box-shadow: -5px 5px 0px var(--sport-red);
        }

        .mod-card {
            background: var(--sport-surface);
            border: 1px solid var(--sport-border);
            clip-path: polygon(0 0, 100% 0, 100% 90%, 95% 100%, 0 100%);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .mod-card:hover {
            border-color: var(--sport-blue);
            transform: scale(1.03) translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .mod-thumb {
            height: 180px;
            background-size: cover;
            background-position: center;
            position: relative;
            border-bottom: 3px solid var(--sport-blue);
        }

        .badge-sport {
            font-family: 'Barlow Condensed', sans-serif;
            font-style: italic;
            background: var(--sport-red);
            color: white;
            padding: 2px 10px;
            font-size: 11px;
            skew: -15deg;
            display: inline-block;
        }

        .btn-action {
            background: #fff;
            color: #000;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900;
            font-style: italic;
            text-align: center;
            padding: 10px;
            transition: all 0.2s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }

        .btn-action:hover {
            background: var(--sport-blue);
            color: white;
        }

        .game-header-sport {
            background: linear-gradient(135deg, #000 0%, #002255 100%);
            position: relative;
            overflow: hidden;
        }

        .game-header-sport::after {
            content: 'PERFORMANCE';
            position: absolute;
            bottom: -20px;
            right: -20px;
            font-size: 12rem;
            font-family: 'Barlow Condensed';
            font-weight: 900;
            color: rgba(255, 255, 255, 0.03);
            font-style: italic;
            pointer-events: none;
        }

        .stats-box {
            background: rgba(255,255,255,0.05);
            border-left: 4px solid var(--sport-red);
            padding: 10px 20px;
        }
    </style>
</head>
<body>

    <!-- Navbar Sport -->
    <nav class="h-[70px] bg-black border-b-4 border-blue-600 sticky top-0 z-50 flex items-center px-8">
        <div class="flex items-center justify-between w-full">
            <div class="flex items-center space-x-4 cursor-pointer" onclick="filterCategory('all')">
                <div class="w-10 h-10 bg-red-600 flex items-center justify-center transform -skew-x-12">
                    <i class="fas fa-bolt text-white"></i>
                </div>
                <span class="sport-font text-3xl tracking-tighter italic">Sport<span class="text-blue-500">Vault</span></span>
            </div>
            
            <div class="hidden lg:flex flex-grow max-w-2xl mx-12 items-center">
                <img src="https://www.google.com/s2/favicons?domain=steampowered.com&sz=32" alt="CSS" class="w-6 h-6 mr-4">
                <div class="relative w-full">
                    <input type="text" id="searchInput" oninput="searchMods()" placeholder="BUSCAR CONTENIDO DE ALTO RENDIMIENTO..." class="w-full bg-[#1a1d21] border-2 border-transparent focus:border-blue-600 py-2 px-12 rounded-sm text-xs font-bold uppercase tracking-widest outline-none transition-all">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-blue-500"></i>
                </div>
            </div>

            <div class="flex items-center space-x-6 sport-font italic font-black text-sm">
                <button class="text-white hover:text-red-500 transition-colors">LOGIN</button>
                <button class="bg-blue-600 px-6 py-2 rounded-sm skew-x-[-15deg] hover:bg-white hover:text-black transition-all">JOIN THE TEAM</button>
            </div>
        </div>
    </nav>

    <div class="flex">
        <!-- Sidebar -->
        <aside class="sidebar hidden lg:block">
            <div class="p-6 text-[11px] font-black text-blue-500 uppercase tracking-[0.3em] italic">Pro Series</div>
            <nav>
                <a href="javascript:void(0)" onclick="filterCategory('all')" class="nav-item active"><i class="fas fa-flag-checkered w-6"></i> All Mods</a>
                <a href="javascript:void(0)" onclick="filterCategory('armas')" class="nav-item"><i class="fas fa-crosshairs w-6"></i> Weapons</a>
                <a href="javascript:void(0)" onclick="filterCategory('mapas')" class="nav-item"><i class="fas fa-route w-6"></i> Circuits / Maps</a>
                <a href="javascript:void(0)" onclick="filterCategory('skins')" class="nav-item"><i class="fas fa-user-tag w-6"></i> Team Skins</a>
            </nav>

            <div class="p-6 mt-4 text-[11px] font-black text-red-500 uppercase tracking-[0.3em] italic">Engineering</div>
            <nav>
                <a href="javascript:void(0)" onclick="filterCategory('gui')" class="nav-item"><i class="fas fa-tachometer-alt w-6"></i> Dashboard / HUD</a>
                <a href="javascript:void(0)" onclick="filterCategory('sonidos')" class="nav-item"><i class="fas fa-volume-up w-6"></i> Engine Sounds</a>
                <a href="javascript:void(0)" onclick="filterCategory('herramientas')" class="nav-item"><i class="fas fa-cogs w-6"></i> Mod Tools</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-grow">
            <!-- Header Sport -->
            <div class="game-header-sport p-12">
                <div class="container mx-auto flex flex-col md:flex-row items-center gap-10 relative z-10">
                    <div class="relative group">
                        <div class="absolute -inset-1 bg-gradient-to-r from-blue-600 to-red-600 rounded blur opacity-25 group-hover:opacity-100 transition duration-1000"></div>
                        <img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/240/header.jpg" class="relative w-64 rounded-sm border-2 border-white/20">
                    </div>
                    <div>
                        <div class="inline-block bg-white text-black sport-font px-4 py-1 mb-4 italic font-black">CS:SOURCE EDITION</div>
                        <h2 class="sport-font text-6xl font-black text-white leading-none mb-4 italic">ULTIMATE <span class="text-blue-500">COLLECTION</span></h2>
                        <div class="grid grid-cols-3 gap-4">
                            <div class="stats-box">
                                <div class="text-[10px] text-gray-400 font-bold uppercase">Files</div>
                                <div class="sport-font text-xl">1.4K</div>
                            </div>
                            <div class="stats-box">
                                <div class="text-[10px] text-gray-400 font-bold uppercase">Speed</div>
                                <div class="sport-font text-xl">1GB/S</div>
                            </div>
                            <div class="stats-box">
                                <div class="text-[10px] text-gray-400 font-bold uppercase">Active</div>
                                <div class="sport-font text-xl">89.4K</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Content -->
            <div class="container mx-auto p-12">
                <div class="flex items-center justify-between mb-12 border-b-2 border-sport-border pb-6">
                    <h3 id="categoryTitle" class="sport-font text-3xl italic font-black">DRIVING DATABASE...</h3>
                    <div class="flex space-x-4">
                        <i class="fas fa-list text-blue-500 cursor-pointer"></i>
                        <i class="fas fa-th-large text-gray-600 cursor-pointer"></i>
                    </div>
                </div>

                <div id="modGrid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-8">
                    <!-- Cards -->
                </div>
            </div>
        </main>
    </div>

    <script>
        const mods = [
            { id: 1, name: "M4A1-S | HYPER SPEED", category: "armas", img: "https://images.gamebanana.com/img/ss/mods/530-90_5b3e6488d011c.jpg", author: "RACE_EDITION", views: "12K", type: "MODEL", badge: "HOT" },
            { id: 2, name: "PRO DASHBOARD HUD V4", category: "gui", img: "https://images.gamebanana.com/img/ss/guis/530-90_623637e192c7d.jpg", author: "TEAM_UI", views: "45K", type: "INTERFACE", badge: "NEW" },
            { id: 3, name: "V8 ENGINE WEAPON SOUNDS", category: "sonidos", img: "https://images.gamebanana.com/img/ss/mods/530-90_568e89f816401.jpg", author: "AUDIO_PRO", views: "8K", type: "SOUND", badge: "HOT" },
            { id: 4, name: "CROWBAR TUNING TOOL", category: "herramientas", img: "https://images.gamebanana.com/img/ss/tools/530-90_5e9f1a2b16401.jpg", author: "ENGINEER", views: "100K", type: "TOOL", badge: "PRO" }
        ];

        function createCard(mod) {
            const div = document.createElement('div');
            div.className = 'mod-card group';
            div.innerHTML = `
                <div class="mod-thumb" style="background-image: url('${mod.img}')">
                    <div class="absolute inset-0 bg-blue-900/20 group-hover:bg-transparent transition-all"></div>
                    <div class="absolute bottom-3 left-3">
                        <span class="badge-sport transform -skew-x-12">${mod.badge}</span>
                    </div>
                </div>
                <div class="p-6">
                    <div class="text-[10px] font-black text-blue-500 mb-1 italic tracking-widest">${mod.type}</div>
                    <h4 class="sport-font text-xl text-white group-hover:text-blue-500 transition-colors mb-3">${mod.name}</h4>
                    <div class="flex items-center justify-between text-[10px] text-gray-500 font-bold mb-6">
                        <span>BY ${mod.author}</span>
                        <span><i class="fas fa-eye mr-1"></i>${mod.views}</span>
                    </div>
                    <button class="btn-action w-full">
                        DOWNLOAD NOW
                    </button>
                </div>
            `;
            return div;
        }

        function renderMods(data) {
            const grid = document.getElementById('modGrid');
            grid.innerHTML = '';
            data.forEach(m => grid.appendChild(createCard(m)));
            document.getElementById('categoryTitle').innerText = data.length > 0 ? `${data.length} MODS READY` : "0 MODS IN LINE";
        }

        function searchMods() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = mods.filter(m => m.name.toLowerCase().includes(term));
            renderMods(filtered);
        }

        function filterCategory(cat) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            if (cat === 'all') {
                renderMods(mods);
            } else {
                renderMods(mods.filter(m => m.category === cat));
            }
        }

        window.onload = () => renderMods(mods);
    </script>
</body>
</html>
